# config/packages/security.yaml
security:
    password_hashers:
        Symfony\Component\Security\Core\User\User: plaintext

    providers:
        in_memory:
            memory: ~

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: in_memory
            # no login required
            security: false

    access_control: []